name: Steam Free Games Daily Check

on:
  schedule:
    # 09:00 UTC = 10:00/11:00 hora de España según horario de verano
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tracker
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: npm start

      - name: Guardar estado de juegos ya notificados
        run: |
          if ! git diff --quiet -- data/seen.json; then
            git config user.name "steam-free-tracker-bot"
            git config user.email "actions@github.com"
            git add data/seen.json
            git commit -m "chore: actualizar juegos ya notificados"
            git push
          else
            echo "Sin cambios en data/seen.json"
          fi
